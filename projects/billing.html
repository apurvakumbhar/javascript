<!DOCTYPE html>
<html>
<head>
    <title>GlowCart - Beauty Billing</title>
    <link rel="stylesheet" href="billing.css">
</head>
<body>

<div id="welcomePage" class="page active welcome-bg">
    <div class="overlay">
        <h1>✨GlowCart Beauty Store</h1>
        <p>Premium Beauty & Skincare Products</p>
        <button id="startBtn" class="primary-btn">Start Shopping</button>
    </div>
</div>

<div id="billingPage" class="page billing-bg">

    <div class="billing-container">

        <h2> Billing Counter</h2>

        <button id="loadBtn" class="secondary-btn">Load Products</button>

        <div id="error"></div>

        <!-- Products -->
        <div id="products" class="product-grid"></div>

        <div class="invoice-section">

            <h3>Invoice</h3>
            

            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qantity</th>
                        <th>Price</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="billBody"></tbody>
            </table>

            <h3 id="finalTotal">Total: ₹0</h3>

            <button id="generateBtn" class="primary-btn">Generate Final Bill</button>
            <button id="resetBtn" class="secondary-btn">Reset Billing</button>
            <div id="result"></div>

        </div>

    </div>

</div>

<script src="billing.js"></script>
</body>
</html>
